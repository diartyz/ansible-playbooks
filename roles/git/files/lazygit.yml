# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
notARepository: skip
git:
  pagers:
    - pager: delta --paging=never
  commit:
    signOff: true
gui:
  theme:
    activeBorderColor:
      - "#00af00"
      - bold
    inactiveBorderColor:
      - "#808080"
    selectedLineBgColor:
      - reverse
  # tmux assigns a random truecolor per author; on limited-color terminals those
  # quantize to near-background and vanish. Pin every author to the tmux green so
  # the name is always legible (trades per-author hues for guaranteed visibility).
  authorColors:
    "*": "#00af00"
