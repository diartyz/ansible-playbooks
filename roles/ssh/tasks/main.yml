---
- name: install packages
  include_role:
    name: pkg
  vars:
    packages_archlinux:
      - openssh
  when: ansible_facts.distribution == 'CentOS'

- name: create ssh folder
  file:
    path: ~/.ssh
    state: directory
    mode: '0700'

- name: copy ssh key
  copy:
    src: '{{ item.src }}'
    dest: '{{ item.dest }}'
    mode: '{{ item.mode }}'
  loop:
    - src: id_rsa
      dest: ~/.ssh/id_rsa
      mode: '0600'
    - src: id_rsa.pub
      dest: ~/.ssh/id_rsa.pub
      mode: '0644'
    - src: zenvy-ghost
      dest: ~/.ssh/zenvy-ghost
      mode: '0600'
    - src: zenvy-ghost.pub
      dest: ~/.ssh/zenvy-ghost.pub
      mode: '0644'

- name: copy ssh config
  copy:
    src: ssh-config
    dest: ~/.ssh/config

- name: copy authorized_keys
  copy:
    src: id_rsa.pub
    dest: ~/.ssh/authorized_keys
    mode: '0400'

- name: update sshd config
  become: true
  lineinfile:
    dest: /etc/ssh/sshd_config
    line: '{{ item.line }}'
    regexp: '{{ item.regexp }}'
  loop:
    - line: 'PubkeyAuthentication yes'
      regexp: '^#?PubkeyAuthentication'
    - line: 'PasswordAuthentication no'
      regexp: '^#?PasswordAuthentication'
    - line: 'Port 2048'
      regexp: '^#?Port'
  when:
    - ansible_facts.distribution == 'CentOS'
  tags:
    - sudo
  register: sshd_conf

- name: reload sshd
  become: true
  systemd:
    name: sshd
    enabled: true
    state: reloaded
  when:
    - ansible_facts.distribution == 'CentOS'
    - sshd_conf.changed
  tags:
    - sudo
