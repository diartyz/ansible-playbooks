---
- name: install clash
  include_role:
    name: pkg
  vars:
    packages_archlinux:
      - clash-meta
    packages_cask:
      - clash-verge-rev

- name: create config folder (Archlinux)
  become: true
  file:
    path: ~/.config/mihomo
    state: directory
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo

- name: copy clash conf (Archlinux)
  become: true
  copy:
    src: config.yml
    dest: ~/.config/mihomo/config.yaml
  register: clash_conf
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo

- name: copy clash service
  become: true
  copy:
    src: clash.service
    dest: /etc/systemd/system/clash.service
  register: clash_service
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo

- name: enable clash
  become: true
  systemd:
    name: clash.service
    enabled: true
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo

- name: reload clash
  become: true
  systemd:
    name: clash.service
    state: restarted
  when:
    - ansible_facts.distribution == 'Archlinux'
    - (clash_conf.changed or clash_service.changed)
  tags:
    - sudo

- name: create config folder (MacOSX)
  file:
    path: ~/.config/clash
    state: directory
  when: ansible_facts.distribution == 'MacOSX'

- name: copy clash conf (MacOSX)
  copy:
    src: config.yml
    dest: ~/.config/clash/config.yaml
  when: ansible_facts.distribution == 'MacOSX'
