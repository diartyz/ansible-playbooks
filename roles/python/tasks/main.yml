---
- name: install packages
  include_role:
    name: pkg
  vars:
    packages_archlinux:
      - python-pip
    packages_macos:
      - python
    packages_ubuntu:
      - python3
      - python-is-python3

- name: add python env to shell rc
  lineinfile:
    path: "~/.{{ item }}rc"
    line: 'export PYTHONUSERBASE="$HOME/.local"'
    insertafter: '^export (?!PATH)'
    create: true
  loop:
    - zsh
    - bash

- name: create pip conf folder
  file:
    path: ~/.config/pip
    state: directory

- name: copy pip conf
  copy:
    src: pip.conf
    dest: ~/.config/pip/pip.conf
