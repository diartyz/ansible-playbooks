---
- name: Allow 'wheel' group to have passwordless sudo
  become: true
  lineinfile:
    dest: /etc/sudoers
    line: '%wheel ALL=(ALL) ALL'
    regexp: '^%wheel'
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo

- name: add groups
  become: true
  group:
    name: '{{ item }}'
  loop:
    - autologin
    - docker
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo

- name: add user
  become: true
  user:
    name: '{{ username }}'
    password: '{{ password | password_hash("sha512") }}'
    groups: wheel,autologin,docker
    update_password: on_create
  when:
    - ansible_facts.distribution == 'Archlinux'
  tags:
    - sudo
