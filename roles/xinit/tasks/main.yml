---
- name: install packages
  include_role:
    name: install-packages
  vars:
    packages_archlinux:
      - arandr
      - blueberry
      - bluez
      - bluez-utils
      - feh
      - gnome-keyring
      - lightdm-gtk-greeter
      - parcellite
      - ttf-firacode-nerd
      - ttf-jetbrains-mono-nerd
      - udiskie
      - wqy-microhei
      - xdg-utils
      - xf86-input-synaptics
      - xf86-video-intel
      - xorg

- name: enable lightdm
  become: true
  systemd:
    name: '{{ item }}'
    enabled: true
  loop:
    - bluetooth
    - lightdm
  when: ansible_distribution == 'Archlinux'

- name: copy xprofile conf
  copy:
    src: .xprofile
    dest: ~/.xprofile
  when: ansible_distribution == 'Archlinux'

- name: enable autologin
  become: true
  lineinfile:
    dest: /etc/lightdm/lightdm.conf
    line: '{{ item.line }}'
    regexp: '{{ item.regexp }}'
  loop:
    - { regexp: '^#?autologin-user=', line: 'autologin-user={{ ansible_user_id }}' }
    - { regexp: '^#?autologin-user-timeout=', line: 'autologin-user-timeout=0' }
  when: ansible_distribution == 'Archlinux'

- name: create fontconfig folder
  file:
    path: ~/.config/fontconfig
    state: directory
  when: ansible_distribution == 'Archlinux'

- name: copy fonts.conf
  copy:
    src: fonts.conf
    dest: ~/.config/fontconfig/fonts.conf
  when: ansible_distribution == 'Archlinux'
