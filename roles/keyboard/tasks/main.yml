---
- name: set no_xmodmap
  debug:
    msg: 'set no_xmodmap'
  register: no_xmodmap

- name: copy hhkb conf
  copy:
    src: hhkb.Xmodmap
    dest: ~/.Xmodmap
  when: no_xmodmap is not defined
  tags:
    - hhkb

- name: copy cherry conf
  copy:
    src: cherry.Xmodmap
    dest: ~/.Xmodmap
  when: no_xmodmap is not defined
  tags:
    - cherry

- name: copy mac conf
  copy:
    src: mac.Xmodmap
    dest: ~/.Xmodmap
  when: no_xmodmap is not defined
  tags:
    - mackb

- name: set no_kbdlight
  debug:
    msg: 'set no_kbdlight'
  register: no_kbdlight
  when: ansible_facts.distribution == 'Archlinux'

- name: copy kbdlight config
  become: true
  copy:
    src: kbdlight
    dest: /usr/local/bin/kbdlight
    mode: '0755'
  when:
    - ansible_facts.distribution == 'Archlinux'
    - no_kbdlight is not defined
  tags:
    - kbdlight
    - sudo

- name: install brightnessctl
  include_role:
    name: pkg
  vars:
    packages_archlinux:
      - brightnessctl

- name: install cask packages
  include_role:
    name: pkg
  vars:
    packages_cask:
      - karabiner-elements

- name: create config folder
  file:
    path: ~/.config/karabiner
    state: directory
  when: ansible_facts.distribution == 'MacOSX'

- name: copy config
  copy:
    src: karabiner.json
    dest: ~/.config/karabiner/karabiner.json
  when: ansible_facts.distribution == 'MacOSX'
