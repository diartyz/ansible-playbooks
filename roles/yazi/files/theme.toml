# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "#35a77c" }

# Hovered
hovered         = { reversed = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#dfa000", bold = true, italic = true, underline = true }
find_position = { fg = "#df69ba", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { italic = true }

# Marker
marker_copied   = { fg = "#8da101", bg = "#8da101" }
marker_cut      = { fg = "#f85552", bg = "#f85552" }
marker_marked   = { fg = "#35a77c", bg = "#35a77c" }
marker_selected = { fg = "#dfa000", bg = "#dfa000" }

# Count
count_copied   = { fg = "#f4f0d9", bg = "#8da101" }
count_cut      = { fg = "#f4f0d9", bg = "#f85552" }
count_selected = { fg = "#f4f0d9", bg = "#dfa000" }

# Border
border_symbol = "│"
border_style  = { fg = "#efebd4" }

# Highlighting
syntect_theme = ""

# : }}}


# : Tabs {{{

[tabs]
active   = { bg = "#35a77c", bold = true }
inactive = { fg = "#35a77c", bg = "#efebd4" }

# Separator
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}


# : Mode {{{

[mode]
normal_main = { fg = "#fdf6e3", bg = "#8da101", bold = true }
normal_alt  = { fg = "#35a77c", bg = "#efebd4", bold = true }

# Select mode
select_main = { fg = "#fdf6e3", bg = "#f85552", bold = true }
select_alt  = { fg = "#35a77c", bg = "#efebd4", bold = true }

# Unset mode
unset_main = { fg = "#fdf6e3", bg = "#35a77c", bold = true }
unset_alt  = { fg = "#35a77c", bg = "#efebd4", bold = true }

# : }}}


# : Status bar {{{

[status]
overall   = {}
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep   = { fg = "#fdf6e3" }
perm_type  = { fg = "#8da101" }
perm_read  = { fg = "#dfa000" }
perm_write = { fg = "#f85552" }
perm_exec  = { fg = "#35a77c" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#35a77c", bg = "#f2efdf" }
progress_error  = { fg = "#f85552", bg = "#f2efdf" }

# : }}}


# : Which {{{

[which]
cols            = 3
mask            = { bg = "#fdf6e3" }
cand            = { fg = "#35a77c" }
rest            = { fg = "#fdf6e3" }
desc            = { fg = "#df69ba" }
separator       = "  "
separator_style = { fg = "#fdf6e3" }

# : }}}


# : Confirmation {{{

[confirm]
border     = { fg = "#35a77c" }
title      = { fg = "#35a77c" }
body       = {}
list       = {}
btn_yes    = { reversed = true }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

# : }}}


# : Spotter {{{

[spot]
border = { fg = "#35a77c" }
title  = { fg = "#35a77c" }

# Table
tbl_col  = { fg = "#35a77c" }
tbl_cell = { fg = "#dfa000", reversed = true }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#8da101" }
title_warn  = { fg = "#dfa000" }
title_error = { fg = "#f85552" }

# Icons
icon_info  = ""
icon_warn  = ""
icon_error = ""

# : }}}


# : Picker {{{

[pick]
border   = { fg = "#35a77c" }
active   = { fg = "#df69ba", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#35a77c" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border   = { fg = "#35a77c" }
active   = { reversed = true }
inactive = {}

# Icons
icon_file    = ""
icon_folder  = ""
icon_command = ""

# : }}}


# : Task manager {{{

[tasks]
border  = { fg = "#35a77c" }
title   = {}
hovered = { fg = "#df69ba", underline = true }

# : }}}


# : Help menu {{{

[help]
on      = { fg = "#35a77c" }
run     = { fg = "#df69ba" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#fdf6e3", bg = "#5c6a72" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#35a77c" },

	# Media
	{ mime = "{audio,video}/*", fg = "#df69ba" },

	# Archives
	{ mime = "application/*zip", fg = "#f85552" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#f85552" },

	# Documents
	{ mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#35a77c" },

	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#efebd4" },

	# Fallback
	{ url = "*", fg = "#93b259" },
	{ url = "*/", fg = "#8da101" }
]

# : }}}
