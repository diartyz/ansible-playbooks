---
- name: install packages
  include_role:
    name: install-packages
  vars:
    packages_archlinux: [gvim, neovim, ripgrep]
    packages_macos: [vim, neovim, ripgrep]
    packages_ubuntu: [vim-gtk3, neovim, ripgrep]

- name: install pynvim (Archlinux)
  become: true
  pacman:
    name: python-pynvim
  when:
    - offline is not defined
    - ansible_distribution == 'Archlinux'

- name: install pynvim (non-Archlinux)
  pip:
    name: pynvim
    extra_args: --user
  when:
    - offline is not defined
    - ansible_distribution != 'Archlinux'

- name: create vim & nvim conf folder
  file:
    path: '{{ item }}'
    state: directory
  loop:
    - ~/.vim/autoload
    - ~/.local/share/nvim/site/autoload
    - ~/.config/nvim

- name: download vim-plug for vim
  get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: ~/.vim/autoload/plug.vim
  when:
    - offline is not defined

- name: copy vim conf
  copy:
    src: '{{ item.src }}'
    dest: '{{ item.dest }}'
  loop:
    - { src: .vimrc, dest: ~/.vimrc }
    - { src: init.lua, dest: ~/.config/nvim/init.lua }
    - { src: lua, dest: ~/.config/nvim }

- name: install win32yank (WSL2)
  shell: |
    curl -Lo /tmp/win32yank.zip https://github.com/equalsraf/win32yank/releases/download/v0.1.1/win32yank-x64.zip
    unzip -p /tmp/win32yank.zip win32yank.exe > /tmp/win32yank.exe
    chmod +x /tmp/win32yank.exe
    sudo mv /tmp/win32yank.exe /usr/local/bin/
  args:
    creates: /usr/local/bin/win32yank.exe
  when:
    - no_sudo is not defined
    - offline is not defined
    - ansible_kernel.find('microsoft-standard-WSL2') != -1
