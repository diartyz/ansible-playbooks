---
- name: install packages
  include_role:
    name: install-packages
  vars:
    packages_archlinux: [zsh, fd, zoxide, xclip, scrot]
    packages_macos: [zsh, fd, zoxide]
    packages_ubuntu: [zsh, fd-find]

- name: clone fzf
  git:
    repo: https://github.com/junegunn/fzf.git
    dest: ~/.fzf
    depth: 1
    update: no
  when:
    - offline is not defined

- name: install fzf
  shell: ~/.fzf/install --all
  args:
    creates: ~/.fzf/bin/fzf
  when:
    - offline is not defined

- name: install zoxide (Ubuntu)
  shell: curl -sS https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | bash
  args:
    creates: ~/.local/bin/zoxide
  when:
    - offline is not defined
    - ansible_distribution == 'Ubuntu'

- name: clone oh-my-zsh
  git:
    repo: '{{ item.repo }}'
    dest: '{{ item.dest }}'
    depth: 1
    update: no
  loop:
    - { repo: 'https://github.com/robbyrussell/oh-my-zsh.git', dest: ~/.oh-my-zsh }
  when:
    - offline is not defined

- name: clone zsh plugins
  git:
    repo: '{{ item.repo }}'
    dest: '{{ item.dest }}'
    depth: 1
    update: no
  loop:
    - { repo: 'https://github.com/romkatv/powerlevel10k', dest: ~/.oh-my-zsh/custom/themes/powerlevel10k }
    - { repo: 'https://github.com/zsh-users/zsh-autosuggestions', dest: ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions }
    - { repo: 'https://github.com/zsh-users/zsh-syntax-highlighting', dest: ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting }
  when:
    - offline is not defined

- name: copy zsh conf
  copy:
    src: .zshrc
    dest: ~/.zshrc

- name: change default shell to zsh
  become: true
  user:
    name: '{{ ansible_user_id }}'
    shell: /bin/zsh
  when:
    - no_sudo is not defined
